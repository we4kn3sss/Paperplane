<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deadlock: Spirit Owl Slow</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            position: fixed; touch-action: none; font-family: sans-serif;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-box { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-weight: 900; font-size: 20px; color: #e1b16c; 
            text-shadow: 0 0 10px rgba(225, 177, 108, 0.6);
        }
        #lives-box { 
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; 
            font-size: 22px; color: #e1b16c; letter-spacing: 3px;
        }

        #controls {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 12px;
            pointer-events: auto;
        }
        .btn {
            width: 65px; height: 65px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #e1b16c;
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            color: #e1b16c; font-size: 24px; user-select: none;
        }
        .btn:active { background: rgba(225, 177, 108, 0.4); }
        #up { grid-area: up; }
        #down { grid-area: down; }
        #left { grid-area: left; }
        #right { grid-area: right; }

        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; pointer-events: auto; color: #e1b16c;
        }
        #restart-btn { 
            padding: 15px 40px; background: #e1b16c; color: #000; 
            border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui">
        <div id="score-box">SPIRIT: <span id="score">0</span></div>
        <div id="lives-box">🜲🜲🜲</div>
        
        <div id="controls">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="left">◀</div>
            <div class="btn" id="down">▼</div>
            <div class="btn" id="right">▶</div>
        </div>

        <div id="game-over">
            <h1>RECALL FAILED</h1>
            <p id="f-score">SCORE: 0</p>
            <div id="restart-btn" onclick="location.reload()">TRY AGAIN</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // СКОРОСТЬ ЗАМЕДЛЕНА: 0.16 вместо 0.22
        let score = 0, lives = 3, isGameOver = false, currentSpeed = 0.16;
        let input = { x: 0, y: 0 }, vel = { x: 0, y: 0 };
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        const owl = new THREE.Group();
        const energyMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2.5,
            transparent: true, opacity: 0.8
        });

        const body = new THREE.Mesh(new THREE.ConeGeometry(0.35, 1.8, 5), energyMat);
        body.rotation.x = Math.PI / 2;
        owl.add(body);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), energyMat);
        head.position.z = -0.9;
        owl.add(head);

        const wingG = new THREE.BoxGeometry(2, 0.02, 0.6);
        const lW = new THREE.Mesh(wingG, energyMat); lW.position.set(-1, 0, -0.1);
        const rW = new THREE.Mesh(wingG, energyMat); rW.position.set(1, 0, -0.1);
        owl.add(lW, rW);
        scene.add(owl);

        owl.add(new THREE.PointLight(0x00ffff, 2, 12));
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const portals = [];
        const portMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1, wireframe: true });
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(new THREE.TorusGeometry(3, 0.05, 8, 24), portMat);
            p.position.set(Math.random()*12-6, Math.random()*8-4, -i*35 - 40);
            p.userData.passed = false;
            scene.add(p); portals.push(p);
        }

        const bind = (id, axis, val) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); input[axis] = val; };
            const stop = () => input[axis] = 0;
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', stop);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', stop);
        };
        bind('up', 'y', 1); bind('down', 'y', -1); bind('left', 'x', -1); bind('right', 'x', 1);

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // Движение вперед (медленное)
            owl.position.z -= currentSpeed;
            
            // Плавное маневрирование
            vel.x = (vel.x + input.x * 0.04) * 0.92;
            vel.y = (vel.y + input.y * 0.04) * 0.92;
            owl.position.x += vel.x;
            owl.position.y += vel.y;

            // Анимация крыльев
            const flapSpeed = 0.005 + currentSpeed * 0.01;
            lW.rotation.z = Math.sin(Date.now() * flapSpeed) * 0.5;
            rW.rotation.z = -Math.sin(Date.now() * flapSpeed) * 0.5;
            
            owl.rotation.z = -vel.x * 3;
            owl.rotation.x = vel.y * 2;

            camera.position.set(owl.position.x*0.5, owl.position.y*0.5 + 1.5, owl.position.z + 7);
            camera.lookAt(owl.position.x, owl.position.y, owl.position.z - 4);

            portals.forEach(p => {
                const dist = Math.sqrt((owl.position.x-p.position.x)**2 + (owl.position.y-p.position.y)**2);
                
                if (!p.userData.passed && Math.abs(p.position.z - owl.position.z) < 0.7) {
                    if (dist < 3.1) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        p.userData.passed = true;
                        // Медленное ускорение (раз в 150 очков)
                        if (score > 0 && score % 150 === 0) currentSpeed += 0.015;
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                }

                if (p.position.z > owl.position.z + 5) {
                    if (!p.userData.passed) {
                        lives--;
                        document.getElementById('lives-box').innerText = "🜲".repeat(Math.max(0, lives));
                        tg.HapticFeedback.notificationOccurred('error');
                        if (lives <= 0) {
                            isGameOver = true;
                            document.getElementById('f-score').innerText = "SCORE: " + score;
                            document.getElementById('game-over').style.display = 'flex';
                        }
                    }
                    p.userData.passed = false;
                    p.position.z -= 280;
                    p.position.x = Math.random()*12-6; p.position.y = Math.random()*8-4;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
            animate();
        }, 300);
    </script>
</body>
</html>
