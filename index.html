<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deadlock: Spirit Owl</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #0a0e17; 
            position: fixed; touch-action: none; font-family: sans-serif;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Интерфейс */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-box { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-weight: 900; font-size: 22px; color: #e1b16c; 
            text-shadow: 0 0 10px rgba(225, 177, 108, 0.5);
        }

        /* КНОПКИ УПРАВЛЕНИЯ (Стрелочки) */
        #controls {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
            pointer-events: auto;
        }
        .btn {
            width: 65px; height: 65px;
            background: rgba(225, 177, 108, 0.1);
            border: 2px solid #e1b16c;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: #e1b16c; font-size: 30px; font-weight: bold;
            user-select: none;
        }
        .btn:active { background: rgba(225, 177, 108, 0.3); transform: scale(0.9); }
        #up { grid-area: up; }
        #down { grid-area: down; }
        #left { grid-area: left; }
        #right { grid-area: right; }

        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 14, 23, 0.98); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; pointer-events: auto; color: #e1b16c;
        }
        #restart-btn { padding: 15px 40px; background: #e1b16c; color: #0a0e17; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui">
        <div id="score-box">SPIRIT: <span id="score">0</span></div>
        
        <div id="controls">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="left">◀</div>
            <div class="btn" id="down">▼</div>
            <div class="btn" id="right">▶</div>
        </div>

        <div id="game-over">
            <h1>SPIRIT LOST</h1>
            <p id="f-score">SCORE: 0</p>
            <div id="restart-btn" onclick="location.reload()">RECLAIM</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let score = 0, isGameOver = false, speed = 0.28;
        let input = { x: 0, y: 0 }, vel = { x: 0, y: 0 };
        
        // ГРАФИКА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e17);
        scene.fog = new THREE.Fog(0x0a0e17, 20, 110);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // СВЕТЯЩАЯСЯ БИРЮЗОВАЯ СОВА (ЭНЕРГИЯ)
        const owl = new THREE.Group();
        const energyMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 2.5,
            transparent: true,
            opacity: 0.8
        });

        // Тело совы
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2.2, 5), energyMat);
        body.rotation.x = Math.PI/2;
        owl.add(body);

        // Голова и глаза
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 8), energyMat);
        head.position.z = -1.1;
        owl.add(head);

        // Крылья
        const wingGeom = new THREE.BoxGeometry(2.5, 0.02, 0.8);
        const leftWing = new THREE.Mesh(wingGeom, energyMat);
        leftWing.position.set(-1.2, 0, -0.2);
        const rightWing = new THREE.Mesh(wingGeom, energyMat);
        rightWing.position.set(1.2, 0, -0.2);
        owl.add(leftWing, rightWing);

        scene.add(owl);

        // Свет от совы
        const pointLight = new THREE.PointLight(0x00ffff, 2, 10);
        owl.add(pointLight);

        // Порталы (Души)
        const portals = [];
        const portMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 1, 
            wireframe: true 
        });
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(new THREE.TorusGeometry(3, 0.05, 8, 30), portMat);
            p.position.set(Math.random()*16-8, Math.random()*12-6, -i*35 - 30);
            scene.add(p); portals.push(p);
        }

        // --- УПРАВЛЕНИЕ СТРЕЛОЧКАМИ ---
        const setupBtn = (id, axis, val) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); input[axis] = val; };
            const end = () => { input[axis] = 0; };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
        };

        setupBtn('up', 'y', 1);
        setupBtn('down', 'y', -1);
        setupBtn('left', 'x', -1);
        setupBtn('right', 'x', 1);

        // Поддержка клавиатуры
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') input.x = -1;
            if(e.key === 'ArrowRight' || e.key === 'd') input.x = 1;
            if(e.key === 'ArrowUp' || e.key === 'w') input.y = 1;
            if(e.key === 'ArrowDown' || e.key === 's') input.y = -1;
        });
        window.addEventListener('keyup', () => { input.x = 0; input.y = 0; });

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            owl.position.z -= speed;
            vel.x = (vel.x + input.x * 0.06) * 0.9;
            vel.y = (vel.y + input.y * 0.06) * 0.9;
            owl.position.x += vel.x;
            owl.position.y += vel.y;

            // Анимация взмахов крыльями
            const flap = Math.sin(Date.now() * 0.01) * 0.4;
            leftWing.rotation.z = flap;
            rightWing.rotation.z = -flap;

            owl.rotation.z = -vel.x * 4;
            owl.rotation.x = vel.y * 2;

            camera.position.set(owl.position.x*0.4, owl.position.y*0.4 + 1.8, owl.position.z + 7);
            camera.lookAt(owl.position.x, owl.position.y, owl.position.z - 5);

            portals.forEach(p => {
                if (Math.abs(p.position.z - owl.position.z) < 0.6) {
                    const d = Math.sqrt((owl.position.x-p.position.x)**2 + (owl.position.y-p.position.y)**2);
                    if (d < 3.2) {
                        score += 10; document.getElementById('score').innerText = score;
                        p.position.z -= 280;
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                }
                if (p.position.z > owl.position.z + 5) {
                    p.position.z -= 280;
                    p.position.x = Math.random()*16-8; p.position.y = Math.random()*12-6;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
