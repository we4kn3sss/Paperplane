<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deadlock: Spirit Drive</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            position: fixed; touch-action: none; font-family: sans-serif;
        }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* ИНТЕРФЕЙС */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #score-box { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; color: #e1b16c; font-weight: 900; font-size: 18px; }
        #lives-box { position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; color: #e1b16c; font-size: 20px; letter-spacing: 2px; }

        /* ИСПРАВЛЕННЫЕ СТРЕЛКИ */
        #controls-wrapper {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; pointer-events: auto;
        }
        .row { display: flex; gap: 10px; }
        .btn {
            width: 65px; height: 65px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid #e1b16c; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            color: #e1b16c; font-size: 24px; user-select: none;
        }
        .btn:active { background: #e1b16c; color: #000; }

        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; pointer-events: auto; color: #e1b16c;
        }
        #restart-btn { padding: 12px 35px; border: 2px solid #e1b16c; background: transparent; color: #e1b16c; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="game-canvas"></div>
    <div id="ui">
        <div id="score-box">SPIRIT: <span id="score">0</span></div>
        <div id="lives-box">🜲🜲🜲</div>
        
        <div id="controls-wrapper">
            <div class="btn" id="up">▲</div>
            <div class="row">
                <div class="btn" id="left">◀</div>
                <div class="btn" id="down">▼</div>
                <div class="btn" id="right">▶</div>
            </div>
        </div>

        <div id="game-over">
            <h1>CONNECTION LOST</h1>
            <p id="f-score">0</p>
            <div id="restart-btn" onclick="location.reload()">RE-SYNC</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let score = 0, lives = 3, isGameOver = false, currentSpeed = 0.35;
        let input = { x: 0, y: 0 }, vel = { x: 0, y: 0 };
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010101);
        scene.fog = new THREE.Fog(0x010101, 10, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // --- ТЕКСТУРА ПОЛА (С ДВИЖЕНИЕМ) ---
        let gridTexture;
        function createGrid() {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#05080a'; ctx.fillRect(0, 0, size, size);
            ctx.strokeStyle = '#e1b16c'; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, size, size);
            // Добавим неоновое свечение в углы
            ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff'; ctx.fillRect(0,0,5,5);

            gridTexture = new THREE.CanvasTexture(canvas);
            gridTexture.wrapS = gridTexture.wrapT = THREE.RepeatWrapping;
            gridTexture.repeat.set(15, 60);
            return gridTexture;
        }

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(120, 800),
            new THREE.MeshStandardMaterial({ map: createGrid(), emissive: 0xe1b16c, emissiveIntensity: 0.1 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -8;
        scene.add(floor);

        // --- СОВА ---
        const owl = new THREE.Group();
        owl.scale.set(0.7, 0.7, 0.7);
        const energyMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 3, transparent: true, opacity: 0.8 });
        
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.6, 5), energyMat);
        body.rotation.x = Math.PI / 2;
        owl.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), energyMat);
        head.position.z = -0.8; owl.add(head);
        
        const wingG = new THREE.BoxGeometry(2, 0.02, 0.5);
        const lW = new THREE.Mesh(wingG, energyMat); lW.position.set(-1, 0, -0.1);
        const rW = new THREE.Mesh(wingG, energyMat); rW.position.set(1, 0, -0.1);
        owl.add(lW, rW);
        scene.add(owl);
        owl.add(new THREE.PointLight(0x00ffff, 4, 15));

        // --- ПОРТАЛЫ ---
        const portals = [];
        const portMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5, wireframe: true });
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.05, 8, 20), portMat);
            p.position.set(Math.random()*12-6, Math.random()*8-4, -i*40 - 40);
            scene.add(p); portals.push(p);
        }

        const bind = (id, axis, val) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); input[axis] = val; };
            const stop = () => input[axis] = 0;
            el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
            el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
        };
        bind('up', 'y', 1); bind('down', 'y', -1); bind('left', 'x', -1); bind('right', 'x', 1);

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            owl.position.z -= currentSpeed;
            
            // ДВИЖЕНИЕ ПОЛА (offset создает эффект езды)
            if (gridTexture) {
                gridTexture.offset.y -= currentSpeed * 0.05;
                floor.position.z = owl.position.z - 100;
            }

            vel.x += (input.x * 0.15 - vel.x) * 0.08;
            vel.y += (input.y * 0.12 - vel.y) * 0.08;
            owl.position.x += vel.x;
            owl.position.y += vel.y;

            lW.rotation.z = Math.sin(Date.now() * 0.008) * 0.6;
            rW.rotation.z = -Math.sin(Date.now() * 0.008) * 0.6;
            owl.rotation.z = THREE.MathUtils.lerp(owl.rotation.z, -vel.x * 5, 0.1);

            camera.position.set(owl.position.x*0.4, owl.position.y*0.4 + 2.5, owl.position.z + 10);
            camera.lookAt(owl.position.x, owl.position.y, owl.position.z - 6);

            portals.forEach(p => {
                const dist = Math.sqrt((owl.position.x-p.position.x)**2 + (owl.position.y-p.position.y)**2);
                if (!p.userData.passed && Math.abs(p.position.z - owl.position.z) < 1.0) {
                    if (dist < 3.3) {
                        score += 10; document.getElementById('score').innerText = score;
                        p.userData.passed = true;
                        if (score % 100 === 0) currentSpeed *= 1.1;
                        tg.HapticFeedback.impactOccurred('light');
                    }
                }
                if (p.position.z > owl.position.z + 12) {
                    if (!p.userData.passed) {
                        lives--; document.getElementById('lives-box').innerText = "🜲".repeat(Math.max(0, lives));
                        tg.HapticFeedback.notificationOccurred('error');
                        if (lives <= 0) { isGameOver = true; document.getElementById('game-over').style.display = 'flex'; }
                    }
                    p.userData.passed = false;
                    p.position.z -= 320;
                    p.position.x = Math.random()*12-6; p.position.y = Math.random()*8-4;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => { window.dispatchEvent(new Event('resize')); animate(); }, 300);
    </script>
</body>
</html>
