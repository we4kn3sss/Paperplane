<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deadlock: Spirit Owl Turbo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            position: fixed; touch-action: none; font-family: sans-serif;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-box { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-weight: 900; font-size: 18px; color: #e1b16c; 
            text-shadow: 0 0 8px rgba(225, 177, 108, 0.6);
        }
        #lives-box { 
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; 
            font-size: 20px; color: #e1b16c; letter-spacing: 2px;
        }

        #controls {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 15px;
            pointer-events: auto;
        }
        .btn {
            width: 60px; height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(225, 177, 108, 0.5);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #e1b16c; font-size: 22px; user-select: none;
        }
        .btn:active { background: rgba(225, 177, 108, 0.3); }
        #up { grid-area: up; }
        #down { grid-area: down; }
        #left { grid-area: left; }
        #right { grid-area: right; }

        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; pointer-events: auto; color: #e1b16c;
        }
        #restart-btn { 
            padding: 12px 35px; border: 1px solid #e1b16c; background: transparent; 
            color: #e1b16c; border-radius: 4px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui">
        <div id="score-box">SPIRIT: <span id="score">0</span></div>
        <div id="lives-box">🜲🜲🜲</div>
        
        <div id="controls">
            <div class="btn" id="up">▲</div>
            <div class="btn" id="left">◀</div>
            <div class="btn" id="down">▼</div>
            <div class="btn" id="right">▶</div>
        </div>

        <div id="game-over">
            <h1 style="letter-spacing: 3px;">VELOCITY CRASH</h1>
            <p id="f-score">0</p>
            <div id="restart-btn" onclick="location.reload()">REBOOT SPIRIT</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // НАСТРОЙКИ СКОРОСТИ (Ускорено в 2 раза)
        let score = 0, lives = 3, isGameOver = false;
        let currentSpeed = 0.32; 
        let input = { x: 0, y: 0 };
        let vel = { x: 0, y: 0 }; 
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 15, 100);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        const owl = new THREE.Group();
        owl.scale.set(0.75, 0.75, 0.75);

        const energyMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2.5,
            transparent: true, opacity: 0.8
        });

        const body = new THREE.Mesh(new THREE.ConeGeometry(0.35, 1.8, 5), energyMat);
        body.rotation.x = Math.PI / 2;
        owl.add(body);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), energyMat);
        head.position.z = -0.9;
        owl.add(head);

        const wingG = new THREE.BoxGeometry(2, 0.02, 0.6);
        const lW = new THREE.Mesh(wingG, energyMat); lW.position.set(-1, 0, -0.1);
        const rW = new THREE.Mesh(wingG, energyMat); rW.position.set(1, 0, -0.1);
        owl.add(lW, rW);
        scene.add(owl);

        owl.add(new THREE.PointLight(0x00ffff, 3, 15));
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));

        const portals = [];
        const portMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1, wireframe: true });
        for(let i=0; i<10; i++) { // Увеличили количество порталов для плотности
            const p = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.05, 8, 24), portMat);
            p.position.set(Math.random()*14-7, Math.random()*10-5, -i*35 - 40);
            p.userData.passed = false;
            scene.add(p); portals.push(p);
        }

        const bind = (id, axis, val) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); input[axis] = val; };
            const stop = () => input[axis] = 0;
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', stop);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', stop);
        };
        bind('up', 'y', 1); bind('down', 'y', -1); bind('left', 'x', -1); bind('right', 'x', 1);

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            owl.position.z -= currentSpeed;
            
            // Плавное маневрирование с инерцией
            const targetVelX = input.x * 0.18;
            const targetVelY = input.y * 0.15;
            vel.x += (targetVelX - vel.x) * 0.08;
            vel.y += (targetVelY - vel.y) * 0.08;
            
            owl.position.x += vel.x;
            owl.position.y += vel.y;

            // Анимация махов крыльями зависит от скорости
            const flap = Date.now() * (0.005 + currentSpeed * 0.01);
            lW.rotation.z = Math.sin(flap) * 0.5;
            rW.rotation.z = -Math.sin(flap) * 0.5;
            
            owl.rotation.z = THREE.MathUtils.lerp(owl.rotation.z, -vel.x * 5, 0.1);
            owl.rotation.x = THREE.MathUtils.lerp(owl.rotation.x, vel.y * 3, 0.1);

            // Камера на отдалении
            camera.position.set(owl.position.x*0.4, owl.position.y*0.4 + 2.5, owl.position.z + 10);
            camera.lookAt(owl.position.x, owl.position.y, owl.position.z - 6);

            portals.forEach(p => {
                const dist = Math.sqrt((owl.position.x-p.position.x)**2 + (owl.position.y-p.position.y)**2);
                
                if (!p.userData.passed && Math.abs(p.position.z - owl.position.z) < 1.0) {
                    if (dist < 3.3) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        p.userData.passed = true;
                        
                        // УСКОРЕНИЕ: +10% за каждые 100 очков
                        if (score > 0 && score % 100 === 0) {
                            currentSpeed *= 1.10;
                            tg.HapticFeedback.notificationOccurred('success');
                        } else {
                            tg.HapticFeedback.impactOccurred('light');
                        }
                    }
                }

                if (p.position.z > owl.position.z + 12) {
                    if (!p.userData.passed) {
                        lives--;
                        document.getElementById('lives-box').innerText = "🜲".repeat(Math.max(0, lives));
                        tg.HapticFeedback.notificationOccurred('error');
                        if (lives <= 0) {
                            isGameOver = true;
                            document.getElementById('f-score').innerText = "SCORE: " + score;
                            document.getElementById('game-over').style.display = 'flex';
                        }
                    }
                    p.userData.passed = false;
                    p.position.z -= 350; // Возвращаем портал далеко вперед
                    p.position.x = Math.random()*14-7; p.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
            animate();
        }, 300);
    </script>
</body>
</html>
