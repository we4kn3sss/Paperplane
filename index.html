<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deadlock: Spirit Owl</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #0a0e17; 
            position: fixed; font-family: 'serif';
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        
        #score-box { 
            position: absolute; top: 30px; left: 30px; 
            font-weight: 700; font-size: 26px; color: #e1b16c;
            text-shadow: 0 0 10px rgba(225, 177, 108, 0.4);
        }
        
        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 14, 23, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; pointer-events: auto; color: #e1b16c;
        }
        
        #restart-btn { 
            padding: 15px 40px; background: transparent; 
            color: #e1b16c; border: 2px solid #e1b16c;
            border-radius: 4px; font-weight: bold; font-size: 18px;
            margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-canvas"></div>

    <div id="ui">
        <div id="score-box">SPIRIT COLLECTED: <span id="score">0</span></div>
        
        <div id="game-over">
            <h1 style="letter-spacing: 5px;">RECALL SPIRIT</h1>
            <p id="f-score">Total: 0</p>
            <div id="restart-btn" onclick="location.reload()">Return to Void</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let score = 0, isGameOver = false, speed = 0.28;
        let vel = { x: 0, y: 0 };
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // ГРАФИКА
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e17);
        scene.fog = new THREE.Fog(0x0a0e17, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // МАТЕРИАЛЫ
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x3d3024, metalness: 0.8, roughness: 0.5 });
        const glowMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });

        // МОДЕЛЬ СОВЫ
        const owl = new THREE.Group();
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2, 6), metalMat);
        body.rotation.x = Math.PI/2;
        owl.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), metalMat);
        head.position.z = -1;
        owl.add(head);

        const wingL = new THREE.Mesh(new THREE.BoxGeometry(2, 0.05, 0.8), metalMat);
        wingL.position.x = -1;
        const wingR = new THREE.Mesh(new THREE.BoxGeometry(2, 0.05, 0.8), metalMat);
        wingR.position.x = 1;
        owl.add(wingL, wingR);

        const eyes = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), glowMat);
        eyes.position.z = -1.3;
        owl.add(eyes);

        scene.add(owl);
        scene.add(new THREE.AmbientLight(0x404040, 2));
        const sun = new THREE.DirectionalLight(0xe1b16c, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // ПОРТАЛЫ
        const portals = [];
        const portMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5, wireframe: true });
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(new THREE.TorusGeometry(3, 0.05, 8, 30), portMat);
            p.position.set(Math.random()*16-8, Math.random()*10-5, -i*40 - 30);
            scene.add(p); portals.push(p);
        }

        // УПРАВЛЕНИЕ КЛАВИАТУРОЙ
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // УПРАВЛЕНИЕ ТАПАМИ (для мобилок без стика)
        window.addEventListener('touchstart', (e) => {
            const x = e.touches.clientX;
            const y = e.touches.clientY;
            if (x < window.innerWidth / 2) keys.a = true; else keys.d = true;
            if (y < window.innerHeight / 2) keys.w = true; else keys.s = true;
        });
        window.addEventListener('touchend', () => { 
            keys.a = keys.d = keys.w = keys.s = false; 
        });

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // Логика управления стрелочками
            if (keys.ArrowLeft || keys.a) vel.x -= 0.05;
            if (keys.ArrowRight || keys.d) vel.x += 0.05;
            if (keys.ArrowUp || keys.w) vel.y += 0.05;
            if (keys.ArrowDown || keys.s) vel.y -= 0.05;

            vel.x *= 0.9; vel.y *= 0.9;
            owl.position.x += vel.x;
            owl.position.y += vel.y;
            owl.position.z -= speed;

            // Наклоны
            owl.rotation.z = -vel.x * 3;
            owl.rotation.x = vel.y * 2;
            wingL.rotation.z = Math.sin(Date.now()*0.01) * 0.3;
            wingR.rotation.z = -Math.sin(Date.now()*0.01) * 0.3;

            camera.position.set(owl.position.x*0.5, owl.position.y*0.5 + 1.5, owl.position.z + 6);
            camera.lookAt(owl.position.x, owl.position.y, owl.position.z - 5);

            portals.forEach(p => {
                if (Math.abs(p.position.z - owl.position.z) < 0.7) {
                    const dist = Math.sqrt((owl.position.x-p.position.x)**2 + (owl.position.y-p.position.y)**2);
                    if (dist < 3.2) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        p.position.z -= 320;
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                }
                if (p.position.z > owl.position.z + 5) {
                    p.position.z -= 320;
                    p.position.x = Math.random()*16-8; p.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
